# ============================================================
# APPLICATION CONFIGURATION
# ============================================================
spring.application.name=auth-system


# ============================================================
# SERVER CONFIGURATION
# ============================================================
server.port=8080
server.servlet.context-path=/

# ============================================================
# DATABASE CONFIGURATION (PostgreSQL)
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/auth-db
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
# Use create-drop for local development so the auth schema is rebuilt cleanly
# instead of trying to alter an existing incompatible database layout.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================
# JWT CONFIGURATION (FIXED)
# ============================================================
jwt.secret=404D635166546A576E5A7234753778214125442A472D4B6150645367566B5970
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ============================================================
# SPRINGDOC OPENAPI (SWAGGER) CONFIGURATION
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.syntax-highlight.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.show-actuator=false
springdoc.packages-to-scan=com.example.auth_system.auth.controller
springdoc.paths-to-match=/api/**

# ============================================================
# CORS CONFIGURATION
# ============================================================
cors.allowed.origins=http://localhost:3000,http://localhost:4200,http://localhost:8080
cors.allowed.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed.headers=Authorization,Content-Type,X-Requested-With,Accept,Origin,Access-Control-Request-Method,Access-Control-Request-Headers
cors.exposed.headers=Authorization,Content-Disposition
cors.allow-credentials=true
cors.max.age=3600

# ============================================================
# INTERNATIONALIZATION (I18N)
# ============================================================
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.cache-duration=3600
spring.messages.fallback-to-system-locale=true

# ============================================================
# LOGGING CONFIGURATION
# ============================================================
logging.level.com.example.auth_system=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/auth-system.log
logging.file.max-size=10MB
logging.file.max-history=30

# ============================================================
# SPRING SECURITY
# ============================================================
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# ============================================================
# EMAIL CONFIGURATION (for OTP and Password Reset)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=eikhaingsoe.ycc@gmail.com
spring.mail.password=hdhq qslj svro adzi
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.default-encoding=UTF-8
mail.debug=true

# ============================================================
# OTP CONFIGURATION
# ============================================================
otp.length=6
otp.expiration-minutes=5
otp.max-attempts=5
otp.resend-cooldown-seconds=60

# ============================================================
# THREAD POOL CONFIGURATION (for Async operations)
# ============================================================
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-thread-

# ============================================================
# ACTUATOR CONFIGURATION (for monitoring)
# ============================================================
management.endpoints.web exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# ============================================================
# CACHE CONFIGURATION (for token blacklisting)
# ============================================================
spring.cache.type=simple
spring.cache.cache-names=tokens,otps
spring.cache.redis.time-to-live=600000

# ============================================================
# RATE LIMITING
# ============================================================
rate-limiting.enabled=true
rate-limiting.max-attempts=5
rate-limiting.block-duration-minutes=15

# ============================================================
# FILE UPLOAD CONFIGURATION (if needed)
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# ============================================================
# DEVELOPMENT TOOLS (Optional)
# ============================================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ============================================================
# SESSION CONFIGURATION
# ============================================================
server.servlet.session.timeout=30m
server.servlet.session.tracking-modes=cookie

app.email.enabled=false

server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-binding-errors=always

# Colorful console output
spring.output.ansi.enabled=always

# Show only INFO and above
logging.level.root=INFO

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history

logging.level.com.example.auth_system.auth.security=DEBUG


